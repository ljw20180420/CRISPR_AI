name: CRISPR_AI
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - bioconda::viennarna
  - python=3.11.11
  - pip
  - pip:
    - plotnine
    - pandas[hdf5]
    - scikit-learn
    - umap-learn
    - xgboost
    - shap
    - deeplift
    - jsonargparse
    - docstring-inheritance
    - more-itertools
    - biopython
    - opt_einsum
    - einops
    - optuna
    - tensorboard
    - tbparse
    - HolisticTraceAnalysis
    - transformers
    - diffusers
    - datasets
    - gradio
